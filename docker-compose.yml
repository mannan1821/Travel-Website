version: "3.8"

services:
  mysql:
    image: mysql:5.7
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: projects
    volumes:
      - mysql--data:/var/lib/mysql
    networks:
      - mynet
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 150s

  phpform:
    image: mdangad/php-form:latest
    container_name: phpform
    networks:
      - mynet
    ports:
      - "80:80"
    depends_on:
      mysql:
        condition: service_healthy

networks:
  mynet:

volumes:
  mysql--data:
